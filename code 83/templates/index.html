<!DOCTYPE html>
<html>

<head>

    <title>Nguyễn Thị Loan</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(#ff9ecf, #fff);
            text-align: center;
            font-family: Arial;
        }
        
        h1 {
            margin-top: 70px;
            font-size: 55px;
            color: #ff2d75;
        }
        
        img {
            width: 250px;
            border-radius: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        #text {
            font-size: 24px;
            margin-top: 20px;
            color: #333;
        }
        
        button {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 20px;
            background: #ff2d75;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .heart {
            position: absolute;
            color: red;
            animation: float 6s linear infinite;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh)
            }
            100% {
                transform: translateY(-10vh)
            }
        }
        
        .flower {
            position: absolute;
            font-size: 25px;
            animation: fall 7s linear infinite;
        }
        
        @keyframes fall {
            0% {
                transform: translateY(-10vh)
            }
            100% {
                transform: translateY(100vh)
            }
        }
        
        .firework {
            position: absolute;
            font-size: 40px;
            animation: boom 1s ease-out;
        }
        
        @keyframes boom {
            0% {
                transform: scale(0)
            }
            100% {
                transform: scale(2);
                opacity: 0
            }
        }
    </style>

</head>

<body>

    <h1>Kính chào quý bà Nguyễn Thị Loan</h1>

   <img src="mom.jpg" width="300">

    <div id="text"></div>

    <button onclick="startWish()">nhấn vào đây nhé Quý cô thanh lịch</button>

    <audio id="music" autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", function () {
  document.getElementById("music").play();
});
</script>

    <script>
        const message = " Công ơn mẫu tử bao la\nTừ bi dưỡng dục chan hòa ái ân\nMai sau con nguyện báo ân\nKhắc ghi nghĩa mẹ muôn phần tri ân\n Nhân dịp ngày 8/3 Quốc tế phụ nữ, con chúc mẹ luôn khỏe mạnh, hạnh phúc và thật nhiều niềm vui, chúc gia đình mình luôn thuận lợi và bình an. Con yêu mẹ rất nhiều ❤️";

        let i = 0;

        function typing() {
            if (i < message.length) {
                document.getElementById("text").innerHTML += message.charAt(i);
                i++;
                setTimeout(typing, 60);
            }
        }

        function startWish() {
            typing();
            firework();
        }

        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";

            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (20 + Math.random() * 20) + "px";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove()
            }, 6000);
        }

        setInterval(createHeart, 400);

        function createFlower() {
            const flower = document.createElement("div");
            flower.classList.add("flower");
            flower.innerHTML = "🌸";

            flower.style.left = Math.random() * 100 + "vw";

            document.body.appendChild(flower);

            setTimeout(() => {
                flower.remove()
            }, 7000);
        }

        setInterval(createFlower, 500);

        function firework() {
            for (let i = 0; i < 20; i++) {

                const boom = document.createElement("div");

                boom.classList.add("firework");

                boom.innerHTML = "✨";

                boom.style.left = Math.random() * 100 + "vw";
                boom.style.top = Math.random() * 80 + "vh";

                document.body.appendChild(boom);

                setTimeout(() => {
                    boom.remove()
                }, 1000);
            }
        }
    </script>
   
</body>


</html>
